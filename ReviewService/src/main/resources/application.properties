spring.application.name=ReviewService
server.port=8082

# ── Eureka Client ─────────────────────────────────────────
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}

# ── PostgreSQL DataSource ──────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/reviewdb}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}

# ── JPA / Hibernate ───────────────────────────────────────
# "validate" — Hibernate checks the schema matches entities, but never touches it.
# Flyway is responsible for creating/altering tables.
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ── Flyway ─────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ── Eureka Instance (fix for Hyper-V/WSL2 hostname resolution) ─────────────
# Forces registration with 127.0.0.1 instead of the Hyper-V virtual
# network hostname (e.g. DESKTOP-xxx.mshome.net) which Netty cannot resolve.
eureka.instance.prefer-ip-address=true
eureka.instance.ip-address=127.0.0.1
