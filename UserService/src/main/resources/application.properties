spring.application.name=UserService
server.port=8080

# ── Eureka Client ─────────────────────────────────────────
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}

# ── PostgreSQL DataSource ──────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/userdb}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}

# ── JPA / Hibernate ───────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ── Flyway ─────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
# spring.flyway.baseline-on-migrate=true

# ── OAuth2 Authorization Server ────────────────────────────
spring.security.oauth2.authorizationserver.issuer=http://localhost:8080

# ── Admin Bootstrap ────────────────────────────────────────
# Secret header value required to call POST /users/admin/signup.
# Override via ADMIN_SIGNUP_SECRET env-var in production.
admin.signup.secret=${ADMIN_SIGNUP_SECRET:dev-admin-secret}

# ── Kafka Producer ─────────────────────────────────────────
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# ── Eureka Instance (fix for Hyper-V/WSL2 hostname resolution) ─────────────
# Forces registration with 127.0.0.1 instead of the Hyper-V virtual
# network hostname (e.g. DESKTOP-xxx.mshome.net) which Netty cannot resolve.
eureka.instance.prefer-ip-address=true
eureka.instance.ip-address=127.0.0.1
