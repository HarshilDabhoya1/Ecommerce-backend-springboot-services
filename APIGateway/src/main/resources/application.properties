spring.application.name=APIGateway
server.port=8888

# ── Eureka Client ─────────────────────────────────────────
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# ── Spring Cloud Gateway Routes ───────────────────────────
# Public UserService endpoints — no token required
spring.cloud.gateway.server.webflux.routes[0].id=user-service-public
spring.cloud.gateway.server.webflux.routes[0].uri=lb://UserService
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/users/signup,/users/admin/signup,/users/login,/users/logout

# ReviewService — declared before product-service (more specific path)
spring.cloud.gateway.server.webflux.routes[1].id=review-service
spring.cloud.gateway.server.webflux.routes[1].uri=lb://ReviewService
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/products/*/reviews,/products/*/reviews/**

# ProductService — /products/** and /categories/** both handled by ProductService
spring.cloud.gateway.server.webflux.routes[2].id=product-service
spring.cloud.gateway.server.webflux.routes[2].uri=lb://ProductService
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/products/**,/categories/**

# OrderService
spring.cloud.gateway.server.webflux.routes[3].id=order-service
spring.cloud.gateway.server.webflux.routes[3].uri=lb://OrderService
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/orders/**

# PaymentService
spring.cloud.gateway.server.webflux.routes[4].id=payment-service
spring.cloud.gateway.server.webflux.routes[4].uri=lb://PaymentService
spring.cloud.gateway.server.webflux.routes[4].predicates[0]=Path=/payments/**

# Protected UserService endpoints (validate, etc.)
spring.cloud.gateway.server.webflux.routes[5].id=user-service
spring.cloud.gateway.server.webflux.routes[5].uri=lb://UserService
spring.cloud.gateway.server.webflux.routes[5].predicates[0]=Path=/users/**

# ?? UserService direct URL for internal validate calls ????????????????????
# The AuthenticationFilter calls this directly (bypasses lb:// to avoid
# ReactorLoadBalancerExchangeFilterFunction compatibility issues).
userservice.validate-url=http://localhost:8080/users/validate

# ── Eureka Instance (fix for Hyper-V/WSL2 hostname resolution) ─────────────
# Forces registration with 127.0.0.1 instead of the Hyper-V virtual
# network hostname (e.g. DESKTOP-xxx.mshome.net) which Netty cannot resolve.
eureka.instance.prefer-ip-address=true
eureka.instance.ip-address=127.0.0.1
