spring.application.name=PaymentService
server.port=8084

# ── Eureka Client ─────────────────────────────────────────
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}

# ── PostgreSQL DataSource ──────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/paymentdb}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}

# ── JPA / Hibernate ────────────────────────────────────────
# "validate" — Hibernate checks schema matches entities; Flyway manages DDL.
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ── Flyway ─────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ── Kafka Producer ─────────────────────────────────────────
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.acks=all
spring.kafka.producer.retries=3
# Fail fast when Kafka is unreachable — prevents ReadTimeoutException on payment endpoints.
# Default max.block.ms is 60 000 ms (60s), which exceeds the HTTP client read timeout.
# 3 000 ms is enough for a connected broker; in dev without Kafka, the send just logs a warning.
spring.kafka.producer.properties.max.block.ms=3000

# ── Stripe (Test Mode) ─────────────────────────────────────
# Set these in application-local.properties or as OS environment variables.
# API key:     https://dashboard.stripe.com/test/apikeys
# Webhook key: Stripe Dashboard → Developers → Webhooks → your endpoint → Signing secret
#              OR run: stripe listen --forward-to localhost:8084/webhooks/stripe
stripe.secret-key=${STRIPE_SECRET_KEY:sk_test_placeholder}
stripe.return-url=${STRIPE_RETURN_URL:https://example.com/payment/return}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:whsec_placeholder}

# ── Reconciliation Cron ────────────────────────────────────
# Default: every hour at minute 0.  Format: second minute hour day month weekday
# Override RECONCILIATION_CRON in your environment for faster cycles during dev.
# Example for every 5 minutes: 0 */5 * * * *

# ── Eureka Instance (fix for Hyper-V/WSL2 hostname resolution) ─────────────
# Forces registration with 127.0.0.1 instead of the Hyper-V virtual
# network hostname (e.g. DESKTOP-xxx.mshome.net) which Netty cannot resolve.
eureka.instance.prefer-ip-address=true
eureka.instance.ip-address=127.0.0.1
