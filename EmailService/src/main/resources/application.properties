spring.application.name=EmailService
server.port=9000

# ── Kafka Consumer ─────────────────────────────────────────
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=email-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*

# ── Mail (SMTP) ────────────────────────────────────────────
# Set MAIL_USERNAME and MAIL_PASSWORD in application-local.properties or as OS env vars.
# For Gmail: use an App Password (not your account password).
# Generate one at: https://myaccount.google.com/apppasswords
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ── Eureka Instance (fix for Hyper-V/WSL2 hostname resolution) ─────────────
# Forces registration with 127.0.0.1 instead of the Hyper-V virtual
# network hostname (e.g. DESKTOP-xxx.mshome.net) which Netty cannot resolve.
eureka.instance.prefer-ip-address=true
eureka.instance.ip-address=127.0.0.1
